<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Shooting - Yusuke Soeda</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --text: #e2e8f0;
            --accent: #22d3ee;
            --danger: #f43f5e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 30%, #111827 0%, var(--bg) 60%);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, sans-serif;
            display: grid;
            place-items: center;
            padding: 1rem;
        }
        .wrap {
            width: min(94vw, 520px);
            background: rgba(15, 23, 42, 0.92);
            border: 2px solid var(--accent);
            border-radius: 14px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
            padding: 1rem;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
        }
        .hud { display: flex; gap: 1rem; flex-wrap: wrap; }
        canvas {
            width: 100%;
            height: auto;
            display: block;
            border: 2px solid var(--accent);
            border-radius: 10px;
            background: #000;
            touch-action: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .help {
            margin-top: 0.7rem;
            opacity: 0.9;
            font-size: 0.92rem;
            line-height: 1.5;
        }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        button {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--accent);
            border-radius: 999px;
            padding: 0.35rem 0.8rem;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div class="hud">
                <span id="score">SCORE: 0</span>
                <span id="hp">HP: 3</span>
            </div>
            <div>
                <button id="restart-btn" type="button">RESTART</button>
                <a href="index.html">メインへ戻る</a>
            </div>
        </div>
        <canvas id="game" width="432" height="768"></canvas>
        <div class="help">
            操作: <b>A / D</b> or <b>← / →</b> で移動, <b>Space</b> で発射<br>
            スマホ: 画面をドラッグするとドラッグ距離ぶん移動。ドラッグ中は自動発射。<br>
            敵を倒してスコアを伸ばしてください。
        </div>
    </div>

    <script>
        (function () {
            var canvas = document.getElementById('game');
            var ctx = canvas.getContext('2d');
            var scoreEl = document.getElementById('score');
            var hpEl = document.getElementById('hp');
            var restartBtn = document.getElementById('restart-btn');

            var PIXEL = 4;
            var ENEMY_SPEED = 2.35;
            var keys = {};
            var bullets = [];
            var enemies = [];
            var stars = [];
            var scanLines = [];
            var score = 0;
            var frame = 0;
            var over = false;
            var dragState = {
                active: false,
                pointerId: null,
                x: 0,
                y: 0
            };

            var playerSprite = [
                '0000001000000',
                '0000012210000',
                '0000122221000',
                '0011223221100',
                '0112224222210',
                '1222224222221',
                '1122234332211',
                '0011334331100',
                '0011304031100',
                '0111000001110',
                '1100000000011',
                '0000000000000'
            ];

            var enemySprite = [
                '0000011100000',
                '0001133311000',
                '0011333331100',
                '0113343433310',
                '1133343433311',
                '1333333333331',
                '0133323233330',
                '0011333331100',
                '0011100011100',
                '0001000001000',
                '0000000000000'
            ];

            var playerMask = buildMask(playerSprite, PIXEL);
            var enemyMask = buildMask(enemySprite, PIXEL);
            var formationPatterns = [
                // V字
                [{ x: 0, y: 0 }, { x: -1, y: 1 }, { x: 1, y: 1 }, { x: -2, y: 2 }, { x: 2, y: 2 }],
                // 横一列
                [{ x: -2, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 0 }, { x: 1, y: 0 }, { x: 2, y: 0 }],
                // 縦一列
                [{ x: 0, y: 0 }, { x: 0, y: 1 }, { x: 0, y: 2 }, { x: 0, y: 3 }, { x: 0, y: 4 }],
                // 斜め右下
                [{ x: -2, y: 0 }, { x: -1, y: 1 }, { x: 0, y: 2 }, { x: 1, y: 3 }, { x: 2, y: 4 }],
                // 逆V字
                [{ x: -2, y: 0 }, { x: -1, y: 1 }, { x: 0, y: 2 }, { x: 1, y: 1 }, { x: 2, y: 0 }],
                // ダイヤ型
                [{ x: 0, y: 0 }, { x: -1, y: 1 }, { x: 1, y: 1 }, { x: 0, y: 2 }, { x: 0, y: 1 }]
            ];

            var player = {
                x: canvas.width / 2 - (playerMask.width / 2),
                y: canvas.height - 120,
                w: playerMask.width,
                h: playerMask.height,
                speed: 5,
                cooldown: 0,
                hp: 3,
                coreRadius: 7
            };

            function buildMask(lines, pixelSize) {
                var points = [];
                var h = lines.length;
                var w = lines[0].length;
                for (var row = 0; row < h; row += 1) {
                    for (var col = 0; col < w; col += 1) {
                        if (lines[row][col] !== '0') {
                            points.push({ x: col * pixelSize, y: row * pixelSize });
                        }
                    }
                }
                return { points: points, width: w * pixelSize, height: h * pixelSize };
            }

            function drawSprite(lines, x, y, palette) {
                for (var row = 0; row < lines.length; row += 1) {
                    var rowStr = lines[row];
                    for (var col = 0; col < rowStr.length; col += 1) {
                        var key = rowStr[col];
                        if (key === '0') continue;
                        ctx.fillStyle = palette[key];
                        ctx.fillRect(x + col * PIXEL, y + row * PIXEL, PIXEL, PIXEL);
                    }
                }
            }

            function reset() {
                bullets = [];
                enemies = [];
                stars = [];
                scanLines = [];
                score = 0;
                frame = 0;
                over = false;
                player.x = canvas.width / 2 - player.w / 2;
                player.y = canvas.height - 120;
                player.hp = 3;
                for (var i = 0; i < 120; i += 1) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        s: Math.random() * 2 + 1,
                        v: Math.random() * 0.7 + 0.4
                    });
                }
                for (var j = 0; j < 24; j += 1) {
                    scanLines.push({ y: j * 36, speed: 0.25 + Math.random() * 0.2 });
                }
                updateHud();
            }

            function updateHud() {
                scoreEl.textContent = 'SCORE: ' + score;
                hpEl.textContent = 'HP: ' + player.hp;
            }

            function spawnFormation() {
                var spacingX = enemyMask.width + 10;
                var spacingY = enemyMask.height + 14;
                var pattern = formationPatterns[Math.floor(Math.random() * formationPatterns.length)];
                var maxOffsetY = 0;
                var centerX = canvas.width / 2 - enemyMask.width / 2;
                var baseX = centerX;

                for (var i = 0; i < pattern.length; i += 1) {
                    if (pattern[i].y > maxOffsetY) maxOffsetY = pattern[i].y;
                }

                // 編隊の末尾まで完全に画面外に置く
                var baseY = -enemyMask.height - maxOffsetY * spacingY - 40;
                var waveSpeed = ENEMY_SPEED;

                for (var j = 0; j < pattern.length; j += 1) {
                    enemies.push({
                        x: baseX + pattern[j].x * spacingX,
                        y: baseY + pattern[j].y * spacingY,
                        w: enemyMask.width,
                        h: enemyMask.height,
                        speed: waveSpeed
                    });
                }
            }

            function shoot() {
                bullets.push({
                    x: player.x + player.w / 2 - 3,
                    y: player.y + 2,
                    r: 3,
                    w: 4,
                    h: 10,
                    speed: 8.5
                });
            }

            function intersects(a, b) {
                return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
            }

            function pointInEnemyMask(px, py, enemy) {
                var lx = px - enemy.x;
                var ly = py - enemy.y;
                if (lx < 0 || ly < 0 || lx >= enemy.w || ly >= enemy.h) return false;
                for (var i = 0; i < enemyMask.points.length; i += 1) {
                    var p = enemyMask.points[i];
                    if (lx >= p.x && lx < p.x + PIXEL && ly >= p.y && ly < p.y + PIXEL) {
                        return true;
                    }
                }
                return false;
            }

            function enemyHitsPlayerCore(enemy) {
                var cx = player.x + player.w / 2;
                var cy = player.y + player.h / 2;
                var r2 = player.coreRadius * player.coreRadius;
                for (var i = 0; i < enemyMask.points.length; i += 1) {
                    var p = enemyMask.points[i];
                    var px = enemy.x + p.x + PIXEL / 2;
                    var py = enemy.y + p.y + PIXEL / 2;
                    var dx = px - cx;
                    var dy = py - cy;
                    if (dx * dx + dy * dy <= r2) return true;
                }
                return false;
            }

            function movePlayer(dx, dy) {
                player.x += dx;
                player.y += dy;
                player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
                player.y = Math.max(canvas.height * 0.42, Math.min(canvas.height - player.h - 10, player.y));
            }

            function update() {
                if (over) return;
                frame += 1;

                if (keys['ArrowLeft'] || keys['a'] || keys['A']) movePlayer(-player.speed, 0);
                if (keys['ArrowRight'] || keys['d'] || keys['D']) movePlayer(player.speed, 0);
                if (keys['ArrowUp'] || keys['w'] || keys['W']) movePlayer(0, -player.speed);
                if (keys['ArrowDown'] || keys['s'] || keys['S']) movePlayer(0, player.speed);

                if (player.cooldown > 0) player.cooldown -= 1;
                if ((keys[' '] || keys['Spacebar'] || dragState.active) && player.cooldown <= 0) {
                    shoot();
                    player.cooldown = 8;
                }

                var waveInterval = Math.max(46, 88 - Math.floor(score / 45));
                if (frame % waveInterval === 0) spawnFormation();

                for (var i = bullets.length - 1; i >= 0; i -= 1) {
                    bullets[i].y -= bullets[i].speed;
                    if (bullets[i].y + bullets[i].h < 0) bullets.splice(i, 1);
                }

                for (var j = enemies.length - 1; j >= 0; j -= 1) {
                    var e = enemies[j];
                    e.y += e.speed;

                    if (e.y > canvas.height) {
                        enemies.splice(j, 1);
                        player.hp -= 1;
                        updateHud();
                        if (player.hp <= 0) over = true;
                        continue;
                    }

                    if (enemyHitsPlayerCore(e)) {
                        enemies.splice(j, 1);
                        player.hp -= 1;
                        updateHud();
                        if (player.hp <= 0) over = true;
                        continue;
                    }

                    for (var k = bullets.length - 1; k >= 0; k -= 1) {
                        var bullet = bullets[k];
                        var hitX = bullet.x + bullet.w / 2;
                        var hitY = bullet.y + bullet.h / 2;
                        if (pointInEnemyMask(hitX, hitY, e)) {
                            bullets.splice(k, 1);
                            enemies.splice(j, 1);
                            score += 10;
                            updateHud();
                            break;
                        }
                    }
                }
            }

            function drawPlayer() {
                ctx.fillStyle = '#22d3ee';
                ctx.beginPath();
                ctx.moveTo(player.x + player.w / 2, player.y);
                ctx.lineTo(player.x, player.y + player.h);
                ctx.lineTo(player.x + player.w, player.y + player.h);
                ctx.closePath();
                ctx.fill();
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#030712';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (var g = 0; g < scanLines.length; g += 1) {
                    var line = scanLines[g];
                    line.y += line.speed;
                    if (line.y > canvas.height) line.y = -10;
                    ctx.fillStyle = 'rgba(34, 211, 238, 0.06)';
                    ctx.fillRect(0, line.y, canvas.width, 1);
                }

                ctx.fillStyle = '#93c5fd';
                for (var i = 0; i < stars.length; i += 1) {
                    var s = stars[i];
                    s.y += s.v;
                    if (s.y > canvas.height) s.y = 0;
                    ctx.fillRect(s.x, s.y, s.s, s.s);
                }

                drawSprite(playerSprite, player.x, player.y, {
                    '1': '#94a3b8',
                    '2': '#cbd5e1',
                    '3': '#64748b',
                    '4': '#22d3ee'
                });

                ctx.fillStyle = '#22d3ee';
                ctx.beginPath();
                ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.coreRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#e2e8f0';
                ctx.beginPath();
                ctx.arc(player.x + player.w / 2, player.y + player.h / 2, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#7dd3fc';
                for (var b = 0; b < bullets.length; b += 1) {
                    var bullet = bullets[b];
                    ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h + 2);
                    ctx.fillStyle = '#e0f2fe';
                    ctx.fillRect(bullet.x + 1, bullet.y - 2, 2, 3);
                    ctx.fillStyle = '#7dd3fc';
                }

                for (var e = 0; e < enemies.length; e += 1) {
                    var enemy = enemies[e];
                    drawSprite(enemySprite, enemy.x, enemy.y, {
                        '1': '#7f1d1d',
                        '2': '#991b1b',
                        '3': '#ef4444',
                        '4': '#fca5a5'
                    });
                }

                if (over) {
                    ctx.fillStyle = 'rgba(2, 6, 23, 0.78)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#e2e8f0';
                    ctx.textAlign = 'center';
                    ctx.font = 'bold 40px sans-serif';
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 12);
                    ctx.font = 'bold 24px sans-serif';
                    ctx.fillText('SCORE: ' + score, canvas.width / 2, canvas.height / 2 + 30);
                }
            }

            function tick() {
                update();
                draw();
                requestAnimationFrame(tick);
            }

            function onPointerDown(event) {
                dragState.active = true;
                dragState.pointerId = event.pointerId;
                dragState.x = event.clientX;
                dragState.y = event.clientY;
                canvas.setPointerCapture(event.pointerId);
            }

            function onPointerMove(event) {
                if (!dragState.active || dragState.pointerId !== event.pointerId) return;
                var dx = event.clientX - dragState.x;
                var dy = event.clientY - dragState.y;
                dragState.x = event.clientX;
                dragState.y = event.clientY;
                movePlayer(dx, dy);
                event.preventDefault();
            }

            function onPointerEnd(event) {
                if (dragState.pointerId !== event.pointerId) return;
                dragState.active = false;
                dragState.pointerId = null;
            }

            canvas.addEventListener('pointerdown', onPointerDown);
            canvas.addEventListener('pointermove', onPointerMove);
            canvas.addEventListener('pointerup', onPointerEnd);
            canvas.addEventListener('pointercancel', onPointerEnd);
            canvas.addEventListener('lostpointercapture', onPointerEnd);

            window.addEventListener('keydown', function (event) {
                keys[event.key] = true;
                if (event.key === ' ') event.preventDefault();
            });

            window.addEventListener('keyup', function (event) {
                keys[event.key] = false;
            });

            restartBtn.addEventListener('click', function () {
                dragState.active = false;
                reset();
            });

            reset();
            tick();
        })();
    </script>
</body>
</html>
